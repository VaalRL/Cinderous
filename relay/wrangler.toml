name = "cinder-relay"
main = "src/worker.ts"
compatibility_date = "2024-12-01"

# 單一全域房間：以 Durable Object 在記憶體中保存連線並做 Ephemeral 扇出。
[[durable_objects.bindings]]
name = "RELAY_ROOM"
class_name = "RelayRoom"

[[migrations]]
tag = "v1"
# SQLite-backed Durable Object：符合 Workers 免費層；此 DO 僅在記憶體持有 WebSocket
# 連線、不用持久儲存，故 backend 選擇不影響行為（亦為未來離線留言存於 DO SQLite 鋪路）。
new_sqlite_classes = ["RelayRoom"]
