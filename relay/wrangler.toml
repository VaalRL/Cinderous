name = "cinder-relay"
main = "src/worker.ts"
compatibility_date = "2024-12-01"

# 單一全域房間：以 Durable Object 在記憶體中保存連線並做 Ephemeral 扇出。
[[durable_objects.bindings]]
name = "RELAY_ROOM"
class_name = "RelayRoom"

[[migrations]]
tag = "v1"
# SQLite-backed Durable Object：符合 Workers 免費層；此 DO 僅在記憶體持有 WebSocket
# 連線、不用持久儲存，故 backend 選擇不影響行為（亦為未來離線留言存於 DO SQLite 鋪路）。
new_sqlite_classes = ["RelayRoom"]

# 公共 TURN 保底（ADR-0243）：設定後 `GET /turn` 會向 Cloudflare 換發短期 TURN 憑證給客戶端，
# 一般使用者在對稱 NAT／嚴格防火牆下通話才有退路。**未設＝端點回 204、客戶端退回純 STUN**（no-op）。
#   1. 在 Cloudflare 開一個 TURN app，取得 Key ID 與 API Token。
#   2. `TURN_KEY_ID` 放這裡（非機密）；API Token 用 `wrangler secret put TURN_API_TOKEN`（機密、勿寫檔）。
#   3. 於 Cloudflare 端設**用量上限**封頂（ADR-0243 的「有上限」）。
# [vars]
# TURN_KEY_ID = "<your-cloudflare-turn-key-id>"
# TURN_TTL_SECONDS = "86400"   # 短期憑證秒數，未設＝1 天；客戶端於 6h 前刷新
