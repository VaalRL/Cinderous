<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nostr Buddy — 端到端 Demo</title>
    <style>
      :root { font-family: "Segoe UI", system-ui, sans-serif; }
      body {
        margin: 0;
        background: linear-gradient(160deg, #cfe3ff, #eef4ff);
        color: #1b2b44;
        min-height: 100vh;
      }
      header.page {
        text-align: center;
        padding: 16px;
      }
      header.page h1 { margin: 0 0 4px; font-size: 20px; }
      header.page p { margin: 0; font-size: 13px; color: #4a607f; }
      .stage { display: flex; gap: 16px; justify-content: center; padding: 16px; flex-wrap: wrap; }
      .peer {
        width: 340px;
        background: #fff;
        border: 1px solid #9db8e0;
        border-radius: 10px;
        box-shadow: 0 6px 18px rgba(40, 80, 150, 0.15);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .peer__bar {
        background: linear-gradient(180deg, #4f8ef7, #2f6fe0);
        color: #fff;
        padding: 8px 12px;
        font-weight: 600;
      }
      .peer__bar small { display: block; font-weight: 400; opacity: 0.85; font-size: 11px; }
      .peer__friend { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid #e3ebf7; }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: #b8c2d0; }
      .dot.online { background: #36c46b; box-shadow: 0 0 6px #36c46b; }
      .friend__status { font-size: 12px; color: #6b7d99; margin-left: auto; }
      .now-playing { font-size: 12px; color: #8a5cc4; padding: 0 12px 6px; min-height: 16px; }
      .log { flex: 1; min-height: 180px; max-height: 240px; overflow-y: auto; padding: 8px 12px; font-size: 13px; }
      .msg { margin: 4px 0; padding: 6px 10px; border-radius: 10px; max-width: 80%; }
      .msg.in { background: #eef2f9; }
      .msg.out { background: #d6ebff; margin-left: auto; }
      .msg.sys { background: transparent; color: #8294b0; font-size: 11px; text-align: center; max-width: 100%; }
      .typing { font-size: 12px; color: #6b7d99; padding: 0 12px; min-height: 16px; font-style: italic; }
      .controls { display: flex; gap: 6px; padding: 8px 12px; border-top: 1px solid #e3ebf7; flex-wrap: wrap; }
      .controls input { flex: 1; min-width: 120px; padding: 6px 8px; border: 1px solid #b9c8e2; border-radius: 6px; }
      button { padding: 6px 10px; border: 1px solid #2f6fe0; background: #4f8ef7; color: #fff; border-radius: 6px; cursor: pointer; font-size: 12px; }
      button.toggle.off { background: #98a6bd; border-color: #98a6bd; }
      button.ghost { background: #fff; color: #2f6fe0; }
      @keyframes nudge { 0%,100%{transform:translate(0,0)} 20%{transform:translate(-6px,4px)} 40%{transform:translate(6px,-4px)} 60%{transform:translate(-5px,-3px)} 80%{transform:translate(5px,3px)} }
      .peer.nudging { animation: nudge 0.5s ease; }
      footer.page { text-align: center; font-size: 12px; color: #6b7d99; padding: 8px 16px 24px; }
    </style>
  </head>
  <body>
    <header class="page">
      <h1>Nostr Buddy — 端到端 Demo</h1>
      <p>同頁兩位用戶經真實 RelayCore（記憶體中）互動：上線狀態、離線留言、輸入中、音樂狀態、Nudge。全部跑在 packages/core 與 relay 的實際邏輯上。</p>
    </header>
    <div class="stage" id="stage"></div>
    <footer class="page">提示：把某一方切到「離線」再從另一方傳訊息，對方上線後會收到離線留言（NIP-17/59 Gift Wrap，經 relay 以 NIP-40 暫存）。</footer>
    <script type="module" src="/src/demo/main.ts"></script>
  </body>
</html>
