[package]
name = "nostr-buddy-desktop"
version = "0.0.0"
edition = "2021"
publish = false
description = "Nostr Buddy 桌面原生橋（Rust）：relay 連線、重連、金鑰儲存、IPC"

# 註：完整 Tauri 二進位（含 tauri / tokio / tungstenite / keyring 等相依）
# 需在具備 Tauri 工具鏈與系統庫（webkit2gtk 等）的環境建置。此 crate 目前
# 僅含與平台無關、可單元測試的連線邏輯；之後在 Tauri 環境再擴充 binary 與相依。
[lib]
name = "nostr_buddy_desktop"
path = "src/lib.rs"
