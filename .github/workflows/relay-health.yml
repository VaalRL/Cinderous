name: Relay 健康檢查（ADR-0039）

# 每小時探測引導 relay 清單、剔除逾時節點、更新**明文**清單。
#
# ✅ 信任根金鑰已移出 CI（ADR-0239）。本 workflow **不再持有 `MAINTAINER_NSEC`**、
# 不再簽章、不再帶內發佈——只探測與更新明文 `relays.json`／`health-history.json`。
# 簽章清單事件（kind 10037，客戶端釘死維護者公鑰驗證）由**維護者本機離線簽發**：
#   pnpm --filter @cinderous/relay bootstrap:sign   （需 MAINTAINER_NSEC 在本機環境）
# 於 relay 集合實際變動時執行即可（錨點稀少、變動罕見）。
#
# 這消除了 ADR-0235 C5 的殘餘：信任根不再暴露於「在 runner 上執行整棵相依樹」的環境。
# 明文清單即使被竄改也無法冒充簽章事件（客戶端只採信釘死公鑰簽章的 10037）。
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

# 只需寫回 relays.json；不觸碰其他分支。
permissions:
  contents: write

concurrency:
  group: relay-health
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      # 版本由 package.json 的 `packageManager` 決定；再指定 version 會觸發
      # 「Multiple versions of pnpm specified」而讓排程在 setup 就失敗（見 ci.yml 同一修正）。
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: 探測 + 更新明文清單（不簽章——信任根金鑰不進 CI，ADR-0239）
        # 不注入 MAINTAINER_NSEC：health-check 未見金鑰時只更新明文清單、略過簽章與發佈。
        run: pnpm --filter @cinderous/relay bootstrap:run

      - name: 提交清單與一致性/uptime 記錄變更（若有）
        run: |
          # relays.json＝簽章清單來源；health-history.json＝跨執行的滾動 uptime（ADR-0092 分級收錄依據）。
          if [ -n "$(git status --porcelain relay/bootstrap/relays.json relay/bootstrap/health-history.json)" ]; then
            git config user.name "relay-health-bot"
            git config user.email "bot@users.noreply.github.com"
            git add relay/bootstrap/relays.json relay/bootstrap/health-history.json
            git commit -m "chore(relay): 自動更新引導 relay 清單健康狀態與 uptime 記錄"
            git push
          else
            echo "清單與記錄無變化，略過提交。"
          fi
