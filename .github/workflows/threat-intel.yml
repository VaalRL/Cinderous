name: 威脅情報 snapshot 更新（ADR-0231 P2）

# 每日重建 docs/threat-intel.json（URLhaus CC0＋StevenBlack MIT，抽 registrable domain）。
# 有變更才提交；提交會觸發 pages.yml 重新部署官網（paths 含 docs/threat-intel.json）。
# 純 node 內建（fetch/fs），不需 pnpm install。
on:
  schedule:
    - cron: "20 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  # 觸發 pages.yml 重佈用（GITHUB_TOKEN 推送不會觸發其他 workflow 的 push 事件——GitHub 防遞迴限制）。
  actions: write

concurrency:
  group: threat-intel
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: 抓取來源並重建 snapshot
        run: node scripts/threat-snapshot.mjs

      - name: 驗證格式
        run: node scripts/threat-snapshot.mjs --check

      - name: 提交 snapshot 變更（若有）＋觸發官網重佈
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "$(git status --porcelain docs/threat-intel.json)" ]; then
            git config user.name "threat-intel-bot"
            git config user.email "bot@users.noreply.github.com"
            git add docs/threat-intel.json
            git commit -m "chore(threat-intel): 自動更新威脅情報 snapshot（ADR-0231 P2）"
            git push
            # GITHUB_TOKEN 的 push 不會觸發 pages.yml 的 push 事件（GitHub 防遞迴限制）
            # → 明確 dispatch 重新部署官網，否則 app 永遠拉不到新 snapshot。
            gh workflow run pages.yml --ref main
          else
            echo "snapshot 無變化，略過提交與重佈。"
          fi
